<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>API Key Test</title>
<style>
  body { font-family: monospace; background: #0a0c10; color: #e8ecf4; padding: 40px; max-width: 700px; }
  h2 { color: #3b82f6; margin-bottom: 20px; }
  input { width: 100%; padding: 10px; background: #161b26; border: 1px solid #333; color: #fff; border-radius: 6px; font-family: monospace; font-size: 13px; margin-bottom: 10px; box-sizing: border-box; }
  button { padding: 10px 20px; background: #3b82f6; border: none; color: #fff; border-radius: 6px; cursor: pointer; font-size: 14px; margin-right: 8px; margin-bottom: 10px; }
  button:hover { background: #2563eb; }
  #log { background: #161b26; border: 1px solid #333; border-radius: 6px; padding: 16px; margin-top: 20px; min-height: 200px; white-space: pre-wrap; font-size: 12px; line-height: 1.6; }
  .ok  { color: #22c55e; }
  .err { color: #ef4444; }
  .info{ color: #f59e0b; }
</style>
</head>
<body>
<h2>🔑 Anthropic API Key Tester</h2>
<p style="color:#8892a4;font-size:13px;margin-bottom:20px;">
  Paste your key and click TEST. This file only tests the API — nothing else.
</p>

<input type="text" id="keyInput" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false">

<div>
  <button onclick="runTest()">▶ TEST KEY</button>
  <button onclick="toggleShow()">👁 SHOW/HIDE</button>
  <button onclick="clearLog()">✕ CLEAR</button>
</div>

<div id="log">Waiting for test…</div>

<script>
function log(msg, cls){
  const el = document.getElementById('log');
  const line = document.createElement('div');
  if(cls) line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}
function clearLog(){
  document.getElementById('log').innerHTML = '';
}
function toggleShow(){
  const inp = document.getElementById('keyInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  log('Input type toggled to: ' + inp.type, 'info');
}

async function runTest(){
  clearLog();
  const key = document.getElementById('keyInput').value.trim();

  log('=== STEP 1: Reading key ===', 'info');
  if(!key){
    log('ERROR: Key field is empty.', 'err'); return;
  }
  log('Key length: ' + key.length + ' chars');
  log('Key prefix: ' + key.substring(0, 14) + '...');
  log('Starts with sk-: ' + key.startsWith('sk-'));

  log('');
  log('=== STEP 2: Testing API connection ===', 'info');
  log('Sending request to api.anthropic.com...');

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 30,
        messages: [{ role: 'user', content: 'Say "API works" and nothing else.' }]
      })
    });

    log('HTTP status: ' + response.status + ' ' + response.statusText);

    const data = await response.json();
    log('Raw response: ' + JSON.stringify(data, null, 2));

    if(response.ok){
      const text = data?.content?.[0]?.text || '(no text)';
      log('');
      log('✓ SUCCESS! API responded: ' + text, 'ok');
      log('✓ Your key works. You can now use the dashboard.', 'ok');
    } else {
      log('');
      log('✗ API returned error: ' + (data?.error?.message || 'unknown'), 'err');
      log('Error type: ' + (data?.error?.type || 'unknown'), 'err');
    }

  } catch(err) {
    log('');
    log('✗ FETCH FAILED (network/CORS error)', 'err');
    log('Error: ' + err.message, 'err');
    log('');
    log('This usually means:', 'info');
    log('  - You opened the file as file:// (double-click)', 'info');
    log('  - Fix: run  python -m http.server 8080  in this folder', 'info');
    log('  - Then open: http://localhost:8080/api-test.html', 'info');
  }
}

// Also test that JS is running at all
document.addEventListener('DOMContentLoaded', function(){
  log('✓ JavaScript is running fine.', 'ok');
  log('✓ Page loaded at: ' + new Date().toLocaleTimeString(), 'ok');
  log('Paste your API key above and click TEST.', 'info');
  log('');
});
</script>
</body>
</html>
